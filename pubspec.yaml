name: quran_vocab
description: "Quran word by word learning app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  quran: ^1.2.3
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  http: ^1.6.0
  scrollable_positioned_list: ^0.3.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  firebase_storage: ^12.3.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  just_audio: ^0.9.40
  clipboard: ^0.1.3
  share_plus: ^13.1.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/data/
    - assets/images/
    
  fonts:
    - family: JameelNoori
      fonts:
        - asset: assets/fonts/JameelNooriNastaleeq.ttf
    - family: IndoPak
      fonts:
        - asset: assets/fonts/NoorHira.ttf
    - family: NoorehudaFont
      fonts:
        - asset: assets/fonts/noorehuda.ttf